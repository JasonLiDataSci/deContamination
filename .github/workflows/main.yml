name: Build Wheels

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - run: python -m pip install cibuildwheel

      - run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_BUILD: cp310-*

      - uses: actions/upload-artifact@v4
        with:
          name: wheels
          path: wheelhouse/*.whl
